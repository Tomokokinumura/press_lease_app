<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>返却登録</title>
    <style>
        :root {
            --panel: rgba(255, 253, 248, 0.94);
            --line: #d9ccb7;
            --text: #2d2418;
            --muted: #756650;
            --accent: #b85c38;
            --accent-dark: #8f4528;
            --surface: #fcf7f0;
            --success: #1d6f42;
            --error: #b42318;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, #fff8ea, transparent 32%),
                linear-gradient(180deg, #f6efe2 0%, #efe4d2 100%);
            padding: 24px;
        }
        .page { max-width: 1180px; margin: 0 auto; display: grid; gap: 20px; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(88, 62, 30, 0.08);
        }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
        .topbar a { color: var(--accent); text-decoration: none; font-weight: 700; }
        .tabbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
            align-items: flex-end;
        }
        .tab-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 148px;
            padding: 14px 20px 12px;
            border: 1px solid var(--line);
            border-bottom: none;
            border-radius: 18px 18px 0 0;
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            position: relative;
            top: 1px;
            box-shadow: 0 -6px 16px rgba(88, 62, 30, 0.08);
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }
        .tab-link::before,
        .tab-link::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 18px;
            height: 18px;
            background: inherit;
            border-bottom: 1px solid var(--line);
        }
        .tab-link::before {
            left: -10px;
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
        }
        .tab-link::after {
            right: -10px;
            clip-path: polygon(0 0, 100% 100%, 0 100%);
        }
        .tab-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 -10px 20px rgba(88, 62, 30, 0.12);
            filter: saturate(1.03);
        }
        .tab-link.is-new { background: #f6d9c9; }
        .tab-link.is-return { background: #d9ead3; }
        .tab-link.is-search { background: #d9e8fb; }
        .tab-link.is-master { background: #eadcf8; }
        .tab-link.is-active {
            transform: translateY(-4px);
            box-shadow: 0 -12px 22px rgba(88, 62, 30, 0.14);
            z-index: 1;
        }
        h1 { margin: 10px 0 0; font-size: clamp(28px, 4vw, 40px); }
        .intro { margin: 10px 0 0; color: var(--muted); line-height: 1.7; }
        .search-row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
        .field { display: grid; gap: 8px; min-width: min(320px, 100%); }
        label { font-size: 14px; font-weight: 700; }
        input, button, select { font: inherit; }
        input[type="text"] {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px 14px;
            background: #fff;
            color: var(--text);
        }
        select {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px 12px;
            background: #fff;
            color: var(--text);
            min-width: 220px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(184, 92, 56, 0.12);
        }
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(184, 92, 56, 0.12);
        }
        button {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px 18px;
            cursor: pointer;
            font-weight: 700;
        }
        .primary { background: var(--accent); border-color: var(--accent-dark); color: #fff; }
        .secondary { background: var(--surface); color: var(--text); }
        .actions { display: flex; justify-content: flex-end; gap: 12px; flex-wrap: wrap; }
        #message { min-height: 24px; color: var(--muted); font-size: 14px; }
        #message[data-state="error"] { color: var(--error); }
        #message[data-state="success"] { color: var(--success); }
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #fffdf8;
        }
        table { width: 100%; min-width: 760px; border-collapse: collapse; }
        thead th {
            background: #efe1cf;
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
        }
        tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid #efe5d6;
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        .empty { padding: 28px; text-align: center; color: var(--muted); }
        .checkbox-cell { width: 90px; }
        .checkbox-cell input { width: 18px; height: 18px; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: #f5eadf;
            color: var(--muted);
        }
        .status-badge.is-returned { background: #e5f3ea; color: var(--success); }
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            background: rgba(45, 36, 24, 0.45);
            padding: 24px;
        }
        .modal.is-open { display: grid; }
        .modal-card {
            width: min(420px, 100%);
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
        }
        .modal-card h2 { margin: 0 0 12px; }
        .modal-card p { margin: 0 0 18px; line-height: 1.7; }
        .modal-actions { display: flex; justify-content: flex-end; }
        @media (max-width: 700px) {
            .search-row { align-items: stretch; }
            .field { min-width: 100%; }
            .search-row button { width: 100%; }
        }
    </style>
</head>
<body>
<main class="page">
    <section class="panel">
        <div class="topbar">
            <a href="/">トップへ戻る</a>
            <span>返却済み管理</span>
        </div>
        <nav class="tabbar" aria-label="画面切替">
            <a href="/search" class="tab-link is-new">新規登録 / 編集</a>
            <a href="/return" class="tab-link is-return is-active">返却登録</a>
            <a href="/slip-search" class="tab-link is-search">伝票検索</a>
            <a href="/master" class="tab-link is-master">マスタ変更</a>
        </nav>
        <h1>返却登録</h1>
        <p class="intro">伝票番号で明細を呼び出し、返却済みチェックを更新します。チェックを入れた行は返却済み、外した行は未返却として保存されます。</p>
    </section>

    <section class="panel">
        <div class="search-row">
            <div class="field">
                <label for="slipNo">伝票No</label>
                <input type="text" id="slipNo" placeholder="例: 202604001" autocomplete="off">
            </div>
            <button type="button" id="searchButton" class="secondary">検索</button>
        </div>
        <div id="message" aria-live="polite"></div>
    </section>

    <section class="panel">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>返却</th>
                    <th>品番</th>
                    <th>タイトル</th>
                    <th>価格</th>
                    <th>税込価格</th>
                    <th>クレジット</th>
                    <th>状態</th>
                    <th>掲載予定</th>
                </tr>
                </thead>
                <tbody id="resultTable">
                <tr id="emptyRow">
                    <td colspan="8" class="empty">伝票Noを入力して検索してください。</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="actions" style="margin-top: 16px;">
            <button type="button" id="updateButton" class="primary">更新</button>
        </div>
    </section>
</main>
<div id="updateModal" class="modal" aria-hidden="true">
    <div class="modal-card">
        <h2>更新完了</h2>
        <p>返却状態を更新しました。</p>
        <div class="modal-actions">
            <button type="button" id="closeModalButton" class="primary">閉じる</button>
        </div>
    </div>
</div>

<script>
    const slipNoInput = document.getElementById("slipNo");
    const searchButton = document.getElementById("searchButton");
    const updateButton = document.getElementById("updateButton");
    const resultTable = document.getElementById("resultTable");
    const message = document.getElementById("message");
    const updateModal = document.getElementById("updateModal");
    const closeModalButton = document.getElementById("closeModalButton");

    searchButton.addEventListener("click", searchSlip);
    updateButton.addEventListener("click", updateReturn);
    closeModalButton.addEventListener("click", closeUpdateModal);
    slipNoInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault();
            searchSlip();
        }
    });
    updateModal.addEventListener("click", (event) => {
        if (event.target === updateModal) {
            closeUpdateModal();
        }
    });

    async function searchSlip() {
        const slipNo = slipNoInput.value.trim();
        if (!slipNo) {
            setMessage("伝票Noを入力してください。", "error");
            return;
        }

        searchButton.disabled = true;
        setMessage("検索中です...", "");

        try {
            const response = await fetch(`/api/return?slipNo=${encodeURIComponent(slipNo)}`);
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error("返却情報の取得に失敗しました。");
            }

            const details = Array.isArray(data.details) ? data.details : [];
            const mediaEntries = Array.isArray(data.mediaEntries) ? data.mediaEntries : [];
            renderRows(details, mediaEntries);
            if (details.length === 0) {
                setMessage("該当する明細が見つかりませんでした。", "error");
            } else {
                setMessage(`${details.length}件の明細を表示しました。`, "success");
            }
        } catch (error) {
            renderRows([], []);
            setMessage(error.message || "返却情報の取得に失敗しました。", "error");
        } finally {
            searchButton.disabled = false;
        }
    }

    async function updateReturn() {
        const rows = Array.from(document.querySelectorAll("#resultTable tr[data-detail-id]"));
        if (!rows.length) {
            setMessage("更新対象の明細がありません。", "error");
            return;
        }

        const payload = rows.map((row) => ({
            id: Number(row.dataset.detailId),
            returned: row.querySelector("input[type='checkbox']").checked,
            plannedLabel: row.querySelector("[data-planned-label]").value
        }));

        updateButton.disabled = true;
        setMessage("更新中です...", "");

        try {
            const response = await fetch("/api/return/update", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error("返却状態の更新に失敗しました。");
            }

            rows.forEach((row) => {
                const checked = row.querySelector("input[type='checkbox']").checked;
                row.querySelector("[data-status]").innerHTML = checked
                    ? '<span class="status-badge is-returned">返却済み</span>'
                    : '<span class="status-badge">未返却</span>';
            });

            setMessage("返却状態を更新しました。", "success");
            openUpdateModal();
        } catch (error) {
            setMessage(error.message || "返却状態の更新に失敗しました。", "error");
        } finally {
            updateButton.disabled = false;
        }
    }

    function renderRows(details, mediaEntries) {
        if (!details.length) {
            resultTable.innerHTML = '<tr id="emptyRow"><td colspan="8" class="empty">検索結果がありません。</td></tr>';
            return;
        }

        const optionsHtml = renderPlannedOptions(mediaEntries);

        resultTable.innerHTML = details.map((detail) => {
            const returned = Boolean(detail.returned);
            return `
                <tr data-detail-id="${escapeHtml(String(detail.id ?? ""))}">
                    <td class="checkbox-cell"><input type="checkbox" ${returned ? "checked" : ""}></td>
                    <td>${escapeHtml(detail.code ?? "")}</td>
                    <td>${escapeHtml(detail.name ?? "")}</td>
                    <td>${escapeHtml(formatNumber(detail.price))}</td>
                    <td>${escapeHtml(formatNumber(detail.taxPrice))}</td>
                    <td>${escapeHtml(detail.credit ?? "")}</td>
                    <td data-status>${returned
                        ? '<span class="status-badge is-returned">返却済み</span>'
                        : '<span class="status-badge">未返却</span>'}</td>
                    <td>
                        <select data-planned-label>
                            ${optionsHtml}
                        </select>
                    </td>
                </tr>
            `;
        }).join("");

        Array.from(document.querySelectorAll("[data-planned-label]")).forEach((select, index) => {
            const detail = details[index];
            const candidate = resolveInitialPlannedLabel(detail, mediaEntries, index);
            if (candidate) {
                select.value = candidate;
            }
        });
    }

    function formatNumber(value) {
        if (value === null || value === undefined || value === "") {
            return "";
        }
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed.toLocaleString("ja-JP") : String(value);
    }

    function setMessage(text, state) {
        message.textContent = text;
        if (state) {
            message.dataset.state = state;
        } else {
            delete message.dataset.state;
        }
    }

    function openUpdateModal() {
        updateModal.classList.add("is-open");
        updateModal.setAttribute("aria-hidden", "false");
    }

    function closeUpdateModal() {
        updateModal.classList.remove("is-open");
        updateModal.setAttribute("aria-hidden", "true");
    }

    function renderPlannedOptions(mediaEntries) {
        const options = ['<option value="">未選択</option>'];
        collectPlannedCandidates(mediaEntries).forEach((candidate) => {
            options.push(`<option value="${escapeHtml(candidate.label)}">${escapeHtml(candidate.text)}</option>`);
        });
        return options.join("");
    }

    function collectPlannedCandidates(mediaEntries) {
        return mediaEntries.map((entry, index) => {
            const label = buildPlannedLabel(index);
            const mediaName = String(entry.mediaName ?? "").trim();
            const projectName = String(entry.projectName ?? "").trim();
            const summary = [mediaName, projectName].filter(Boolean).join(" / ");
            return {
                label,
                text: summary ? `${label}: ${summary}` : `${label}: 媒体情報未入力`
            };
        });
    }

    function resolveInitialPlannedLabel(detail, mediaEntries, index) {
        const label = String(detail.plannedLabel ?? "").trim();
        if (label) {
            return label;
        }
        const mediaEntry = mediaEntries[index];
        if (!mediaEntry) {
            return "";
        }
        return buildPlannedLabel(index);
    }

    function buildPlannedLabel(index) {
        return String.fromCharCode(65 + index);
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }
</script>
</body>
</html>
