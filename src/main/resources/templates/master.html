<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マスタ変更</title>
    <style>
        :root {
            --line: #d9ccb7;
            --text: #2d2418;
            --muted: #756650;
            --accent: #b85c38;
            --accent-dark: #8f4528;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, #fff8ea, transparent 32%),
                linear-gradient(180deg, #f6efe2 0%, #efe4d2 100%);
            padding: 24px;
        }
        .page { max-width: 900px; margin: 0 auto; display: grid; gap: 20px; }
        .panel {
            background: rgba(255, 253, 248, 0.94);
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(88, 62, 30, 0.08);
        }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
        .topbar a { color: var(--accent); text-decoration: none; font-weight: 700; }
        .tabbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .tab-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 18px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fcf7f0;
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
        }
        .tab-link.is-active {
            background: var(--accent);
            border-color: var(--accent-dark);
            color: #fff;
        }
        h1 { margin: 10px 0 0; font-size: clamp(28px, 4vw, 40px); }
        p { color: var(--muted); line-height: 1.7; }
        label { display: block; margin-bottom: 10px; font-weight: 700; }
        textarea {
            width: 100%;
            min-height: 280px;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px 16px;
            resize: vertical;
            font: inherit;
            color: var(--text);
            background: #fff;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(184, 92, 56, 0.12);
        }
        .actions { margin-top: 16px; display: flex; justify-content: flex-end; }
        button {
            border: 1px solid var(--accent-dark);
            border-radius: 14px;
            padding: 12px 22px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            background: rgba(45, 36, 24, 0.45);
            padding: 24px;
        }
        .modal.is-open { display: grid; }
        .modal-card {
            width: min(420px, 100%);
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
        }
        .modal-card h2 { margin: 0 0 12px; }
        .modal-card p { margin: 0 0 18px; line-height: 1.7; }
        .modal-actions { display: flex; justify-content: flex-end; }
    </style>
</head>
<body>
<main class="page">
    <section class="panel">
        <div class="topbar">
            <a href="/">トップへ戻る</a>
            <span>固定文言管理</span>
        </div>
        <nav class="tabbar" aria-label="画面切替">
            <a href="/search" class="tab-link">新規登録 / 編集</a>
            <a href="/return" class="tab-link">返却登録</a>
            <a href="/slip-search" class="tab-link">伝票検索</a>
            <a href="/master" class="tab-link is-active">マスタ変更</a>
        </nav>
        <h1>マスタ変更</h1>
        <p>Excelや帳票に使用する固定文言をここで管理します。保存すると次回表示時にも更新内容が反映されます。</p>
    </section>

    <section class="panel">
        <form action="/master/update" method="post" th:object="${master}">
            <input type="hidden" th:field="*{id}">
            <label for="masterText">固定文言</label>
            <textarea id="masterText" th:field="*{masterText}" placeholder="ここにExcelに表示する固定文言を入力してください"></textarea>
            <div class="actions">
                <button type="submit">保存</button>
            </div>
        </form>
    </section>
</main>
<div id="saveModal" class="modal" aria-hidden="true">
    <div class="modal-card">
        <h2>保存完了</h2>
        <p>マスタ文言を保存しました。</p>
        <div class="modal-actions">
            <button type="button" id="closeModalButton">閉じる</button>
        </div>
    </div>
</div>
<script>
    const saveModal = document.getElementById("saveModal");
    const closeModalButton = document.getElementById("closeModalButton");

    if (closeModalButton) {
        closeModalButton.addEventListener("click", closeSaveModal);
    }

    if (saveModal) {
        saveModal.addEventListener("click", (event) => {
            if (event.target === saveModal) {
                closeSaveModal();
            }
        });

        const params = new URLSearchParams(window.location.search);
        if (params.has("saved")) {
            saveModal.classList.add("is-open");
            saveModal.setAttribute("aria-hidden", "false");
        }
    }

    function closeSaveModal() {
        if (!saveModal) {
            return;
        }
        saveModal.classList.remove("is-open");
        saveModal.setAttribute("aria-hidden", "true");
        const url = new URL(window.location.href);
        url.searchParams.delete("saved");
        window.history.replaceState({}, "", url.pathname + url.search);
    }
</script>
</body>
</html>
