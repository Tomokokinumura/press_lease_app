<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品番検索</title>
    <style>
        :root {
            --bg: #f5f1e8;
            --panel: #fffdf8;
            --line: #d4c6ad;
            --text: #2d2418;
            --muted: #756650;
            --accent: #b85c38;
            --accent-soft: #f3dfd4;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, #fff7e8, transparent 32%),
                linear-gradient(180deg, #f6efe2 0%, #efe4d2 100%);
            padding: 32px 20px 48px;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
        }

        .hero {
            background: rgba(255, 253, 248, 0.88);
            border: 1px solid rgba(212, 198, 173, 0.7);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 18px 45px rgba(88, 62, 30, 0.08);
            backdrop-filter: blur(6px);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 44px);
            line-height: 1.1;
        }

        .intro {
            margin: 14px 0 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .search-panel {
            margin-top: 22px;
            display: grid;
            gap: 10px;
        }

        label {
            font-size: 14px;
            font-weight: 700;
        }

        .search-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        #codeInput {
            width: min(360px, 100%);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 18px;
            letter-spacing: 0.08em;
            background: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        #codeInput:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(184, 92, 56, 0.12);
        }

        .hint,
        #message {
            font-size: 14px;
            color: var(--muted);
        }

        #message[data-state="error"] {
            color: #b42318;
        }

        #message[data-state="success"] {
            color: #1d6f42;
        }

        .table-wrap {
            margin-top: 24px;
            overflow-x: auto;
            background: var(--panel);
            border: 1px solid rgba(212, 198, 173, 0.7);
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(88, 62, 30, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 820px;
        }

        thead th {
            background: var(--accent-soft);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid var(--line);
        }

        tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid #efe5d6;
            background: rgba(255, 255, 255, 0.82);
        }

        tbody tr:nth-child(even) td {
            background: rgba(252, 247, 240, 0.92);
        }

        tbody input {
            width: 100%;
            border: 1px solid transparent;
            background: transparent;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 15px;
            color: var(--text);
        }

        tbody input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(184, 92, 56, 0.1);
        }

        .empty {
            padding: 36px 20px;
            text-align: center;
            color: var(--muted);
        }

        @media (max-width: 720px) {
            body {
                padding: 20px 14px 32px;
            }

            .hero {
                padding: 20px;
                border-radius: 18px;
            }

            thead th,
            tbody td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <section class="hero">
        <p class="eyebrow">Google Sheets Search</p>
        <h1>品番検索</h1>
        <p class="intro">8桁の品番を入力して Enter を押すと、Google Sheets からデータを取得して一覧へ追加します。各セルはそのまま編集できます。</p>

        <div class="search-panel">
            <label for="codeInput">品番</label>
            <div class="search-row">
                <input type="text" id="codeInput" inputmode="numeric" placeholder="品番を入力（8桁）" maxlength="8" autocomplete="off">
                <span class="hint">半角数字8桁で入力してください</span>
            </div>
            <div id="message" aria-live="polite"></div>
        </div>
    </section>

    <section class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>クレジット</th>
                <th>品番</th>
                <th>タイトル</th>
                <th>価格</th>
                <th>税込価格</th>
            </tr>
            </thead>
            <tbody id="resultTable">
            <tr id="emptyRow">
                <td class="empty" colspan="5">まだ検索結果がありません。品番を入力して Enter で追加できます。</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<script>
    const codeInput = document.getElementById("codeInput");
    const resultTable = document.getElementById("resultTable");
    const message = document.getElementById("message");
    const emptyRowId = "emptyRow";

    codeInput.addEventListener("input", function () {
        this.value = this.value.replace(/\D/g, "").slice(0, 8);
    });

    codeInput.addEventListener("keydown", async function (event) {
        if (event.key !== "Enter") {
            return;
        }

        event.preventDefault();
        const code = this.value.trim();

        if (!/^\d{8}$/.test(code)) {
            setMessage("品番は8桁の半角数字で入力してください。", "error");
            return;
        }

        setMessage("検索中です...", "");

        try {
            const response = await fetch(`/api/search?code=${encodeURIComponent(code)}`);
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                const errorMessage = data.message || "検索に失敗しました。";
                throw new Error(errorMessage);
            }

            appendResultRow(data);
            this.value = "";
            this.focus();
            setMessage(`${code} を追加しました。`, "success");
        } catch (error) {
            setMessage(error.message || "検索に失敗しました。", "error");
        }
    });

    function appendResultRow(data) {
        const emptyRow = document.getElementById(emptyRowId);
        if (emptyRow) {
            emptyRow.remove();
        }

        const taxIncludedPrice = parsePrice(data.price);
        const basePrice = Number.isFinite(taxIncludedPrice) ? Math.ceil(taxIncludedPrice / 1.1) : "";
        const taxIncludedDisplay = Number.isFinite(taxIncludedPrice)
            ? String(taxIncludedPrice)
            : String(data.price ?? "");
        const row = document.createElement("tr");

        row.innerHTML = `
            <td><input type="text" value=""></td>
            <td><input type="text" value="${escapeHtml(data.code ?? "")}"></td>
            <td><input type="text" value="${escapeHtml(data.name ?? "")}"></td>
            <td><input type="text" value="${escapeHtml(String(basePrice))}"></td>
            <td><input type="text" value="${escapeHtml(taxIncludedDisplay)}"></td>
        `;

        resultTable.appendChild(row);
    }

    function parsePrice(value) {
        const normalized = String(value ?? "").replace(/,/g, "").trim();
        const parsed = Number.parseFloat(normalized);
        return Number.isFinite(parsed) ? parsed : NaN;
    }

    function setMessage(text, state) {
        message.textContent = text;
        if (state) {
            message.dataset.state = state;
        } else {
            delete message.dataset.state;
        }
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }
</script>
</body>
</html>
